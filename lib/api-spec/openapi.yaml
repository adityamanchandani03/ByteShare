openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ByteShare API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User operations
  - name: classrooms
    description: Classroom operations
  - name: resources
    description: Resource operations
  - name: tokens
    description: Token operations
  - name: notifications
    description: Notification operations
  - name: upload
    description: File upload operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # Classrooms
  /classrooms:
    get:
      operationId: getMyClassrooms
      tags: [classrooms]
      summary: Get classrooms I belong to
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of classrooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Classroom"
    post:
      operationId: createClassroom
      tags: [classrooms]
      summary: Create a classroom
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassroomInput"
      responses:
        "201":
          description: Classroom created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"

  /classrooms/join:
    post:
      operationId: joinClassroom
      tags: [classrooms]
      summary: Join a classroom by invite code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinClassroomInput"
      responses:
        "200":
          description: Joined successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"
        "404":
          description: Invalid invite code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /classrooms/{classroomId}:
    get:
      operationId: getClassroom
      tags: [classrooms]
      summary: Get classroom by ID
      security:
        - bearerAuth: []
      parameters:
        - name: classroomId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Classroom details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"
    patch:
      operationId: updateClassroom
      tags: [classrooms]
      summary: Update classroom (host only)
      security:
        - bearerAuth: []
      parameters:
        - name: classroomId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassroomUpdate"
      responses:
        "200":
          description: Updated classroom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"

  /classrooms/{classroomId}/members:
    get:
      operationId: getClassroomMembers
      tags: [classrooms]
      summary: Get classroom members
      security:
        - bearerAuth: []
      parameters:
        - name: classroomId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"

  /classrooms/{classroomId}/members/{memberId}:
    delete:
      operationId: removeMember
      tags: [classrooms]
      summary: Remove a member (host only)
      security:
        - bearerAuth: []
      parameters:
        - name: classroomId
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /classrooms/{classroomId}/stats:
    get:
      operationId: getClassroomStats
      tags: [classrooms]
      summary: Get classroom statistics (host only)
      security:
        - bearerAuth: []
      parameters:
        - name: classroomId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Classroom stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassroomStats"

  # Resources
  /classrooms/{classroomId}/resources:
    get:
      operationId: getClassroomResources
      tags: [resources]
      summary: Get approved resources for a classroom
      security:
        - bearerAuth: []
      parameters:
        - name: classroomId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of approved resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"
    post:
      operationId: uploadResource
      tags: [resources]
      summary: Upload a resource to classroom
      security:
        - bearerAuth: []
      parameters:
        - name: classroomId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceInput"
      responses:
        "201":
          description: Resource submitted for approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /classrooms/{classroomId}/resources/pending:
    get:
      operationId: getPendingResources
      tags: [resources]
      summary: Get pending resources for host review
      security:
        - bearerAuth: []
      parameters:
        - name: classroomId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pending resources list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"

  /classrooms/{classroomId}/resources/{resourceId}/approve:
    post:
      operationId: approveResource
      tags: [resources]
      summary: Approve a resource (host only)
      security:
        - bearerAuth: []
      parameters:
        - name: classroomId
          in: path
          required: true
          schema:
            type: string
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resource approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /classrooms/{classroomId}/resources/{resourceId}/reject:
    post:
      operationId: rejectResource
      tags: [resources]
      summary: Reject a resource (host only)
      security:
        - bearerAuth: []
      parameters:
        - name: classroomId
          in: path
          required: true
          schema:
            type: string
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectionInput"
      responses:
        "200":
          description: Resource rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /classrooms/{classroomId}/resources/{resourceId}/download:
    post:
      operationId: downloadResource
      tags: [resources]
      summary: Download a resource (costs 5 tokens)
      security:
        - bearerAuth: []
      parameters:
        - name: classroomId
          in: path
          required: true
          schema:
            type: string
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadResponse"
        "402":
          description: Insufficient tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Token history
  /tokens/history:
    get:
      operationId: getTokenHistory
      tags: [tokens]
      summary: Get token transaction history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TokenTransaction"

  # Notifications
  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get notifications for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/{notificationId}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      security:
        - bearerAuth: []
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  # Upload signature
  /upload/sign:
    post:
      operationId: getUploadSignature
      tags: [upload]
      summary: Get Cloudinary upload signature
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Upload signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSignature"

  # Dashboard summary (wow endpoint)
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [users]
      summary: Get dashboard summary for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, tokenBalance, reputation]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        tokenBalance:
          type: integer
        reputation:
          type: integer
        createdAt:
          type: string
          format: date-time

    ClassroomInput:
      type: object
      required: [name, subject, department, semester]
      properties:
        name:
          type: string
          minLength: 3
        subject:
          type: string
        department:
          type: string
        semester:
          type: string
        description:
          type: ["string", "null"]

    ClassroomUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]

    JoinClassroomInput:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string
          minLength: 6
          maxLength: 6

    Classroom:
      type: object
      required: [id, name, subject, department, semester, inviteCode, hostId, memberCount]
      properties:
        id:
          type: string
        name:
          type: string
        subject:
          type: string
        department:
          type: string
        semester:
          type: string
        description:
          type: ["string", "null"]
        inviteCode:
          type: string
        hostId:
          type: string
        hostName:
          type: string
        memberCount:
          type: integer
        isHost:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Member:
      type: object
      required: [id, name, email, reputation, joinedAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        reputation:
          type: integer
        joinedAt:
          type: string
          format: date-time

    ClassroomStats:
      type: object
      required: [totalMembers, totalApproved, totalPending, totalTokensAwarded, topContributors]
      properties:
        totalMembers:
          type: integer
        totalApproved:
          type: integer
        totalPending:
          type: integer
        totalTokensAwarded:
          type: integer
        topContributors:
          type: array
          items:
            $ref: "#/components/schemas/Contributor"

    Contributor:
      type: object
      required: [id, name, reputation, approvedCount]
      properties:
        id:
          type: string
        name:
          type: string
        reputation:
          type: integer
        approvedCount:
          type: integer

    ResourceInput:
      type: object
      required: [title, type, fileUrl, publicId, fileName]
      properties:
        title:
          type: string
          minLength: 3
        description:
          type: ["string", "null"]
        type:
          type: string
          enum: [notes, assignment, ppt, previous_year_paper, lab_file]
        fileUrl:
          type: string
        publicId:
          type: string
        fileName:
          type: string

    Resource:
      type: object
      required: [id, title, type, fileUrl, publicId, fileName, status, uploaderId, uploaderName, classroomId, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
          enum: [notes, assignment, ppt, previous_year_paper, lab_file]
        fileUrl:
          type: string
        publicId:
          type: string
        fileName:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        uploaderId:
          type: string
        uploaderName:
          type: string
        classroomId:
          type: string
        rejectionReason:
          type: ["string", "null"]
        tokenReward:
          type: integer
        createdAt:
          type: string
          format: date-time

    RejectionInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 5

    DownloadResponse:
      type: object
      required: [downloadUrl]
      properties:
        downloadUrl:
          type: string
        tokensDeducted:
          type: integer
        newBalance:
          type: integer

    TokenTransaction:
      type: object
      required: [id, type, amount, description, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [earned, spent]
        amount:
          type: integer
        description:
          type: string
        resourceTitle:
          type: ["string", "null"]
        classroomName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    Notification:
      type: object
      required: [id, type, message, isRead, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [resource_approved, resource_rejected, removed_from_classroom]
        message:
          type: string
        isRead:
          type: boolean
        resourceTitle:
          type: ["string", "null"]
        classroomName:
          type: ["string", "null"]
        rejectionReason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    UploadSignature:
      type: object
      required: [signature, timestamp, cloudName, apiKey, uploadPreset]
      properties:
        signature:
          type: string
        timestamp:
          type: integer
        cloudName:
          type: string
        apiKey:
          type: string
        uploadPreset:
          type: string

    DashboardSummary:
      type: object
      required: [tokenBalance, reputation, classroomCount, uploadedCount, approvedCount, pendingCount, recentTransactions]
      properties:
        tokenBalance:
          type: integer
        reputation:
          type: integer
        classroomCount:
          type: integer
        uploadedCount:
          type: integer
        approvedCount:
          type: integer
        pendingCount:
          type: integer
        recentTransactions:
          type: array
          items:
            $ref: "#/components/schemas/TokenTransaction"
        unreadNotificationCount:
          type: integer
